name: Build DevForge APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract Zip File
      run: |
        unzip -o devforge.zip -d temp_extracted/
        if [ -d "temp_extracted/DevForge" ]; then
          cp -rn temp_extracted/DevForge/.[!.]* . 2>/dev/null || true
          cp -rn temp_extracted/DevForge/* . 2>/dev/null || true
        elif [ -d "temp_extracted/devforge" ]; then
          cp -rn temp_extracted/devforge/.[!.]* . 2>/dev/null || true
          cp -rn temp_extracted/devforge/* . 2>/dev/null || true
        else
          cp -rn temp_extracted/.[!.]* . 2>/dev/null || true
          cp -rn temp_extracted/* . 2>/dev/null || true
        fi

    - name: Create Matching google-services.json & .env
      run: |
        if [ ! -f ".env.example" ]; then touch .env.example; fi
        if [ ! -f "app/.env.example" ]; then touch app/.env.example 2>/dev/null || true; fi
        
        # Exact package name match kar diya hai
        echo '{"project_info":{"project_number":"123456789","project_id":"devforge-app"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:123456","android_client_info":{"package_name":"com.aistudio.devforge.lhryqz"}},"api_key":[{"current_key":"dummy_key"}]}]}' > app/google-services.json

    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        cp debug.keystore app/debug.keystore 2>/dev/null || true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Ensure Gradlew Exists
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DevForge-App
        path: app/build/outputs/apk/debug/app-debug.apk
        
