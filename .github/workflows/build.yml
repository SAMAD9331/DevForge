name: Build DevForge APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip DevForge Source
      run: |
        sudo apt-get install -y unzip
        # Zip file ko unzip karo (case-insensitive check)
        ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
        if [ -n "$ZIP_FILE" ]; then
          echo "Extracting $ZIP_FILE..."
          unzip -o "$ZIP_FILE" -d extracted/
          # Move files to root directory
          if [ -d "extracted/DevForge" ]; then
            cp -rn extracted/DevForge/* .
          else
            cp -rn extracted/* .
          fi
        else
          echo "No zip file found!"
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make Gradle Executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DevForge-App
        path: app/build/outputs/apk/debug/app-debug.apk
        
