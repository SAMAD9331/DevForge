name: Build DevForge APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract Zip File
      run: |
        echo "Unzipping devforge.zip..."
        unzip -o devforge.zip -d temp_extracted/
        
        # Zip ke andar root folder search karke files move kar rahe hain
        if [ -d "temp_extracted/DevForge" ]; then
          cp -rn temp_extracted/DevForge/* .
        elif [ -d "temp_extracted/devforge" ]; then
          cp -rn temp_extracted/devforge/* .
        else
          cp -rn temp_extracted/* .
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Ensure Gradlew Exists
      run: |
        if [ ! -f "gradlew" ]; then
          echo "gradlew not found, generating wrapper..."
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DevForge-App
        path: app/build/outputs/apk/debug/app-debug.apk
        
