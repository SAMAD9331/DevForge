name: Build DevForge APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract Zip File (Including Hidden Files)
      run: |
        echo "Unzipping devforge.zip..."
        unzip -o devforge.zip -d temp_extracted/
        
        # Hidden files (.env wagara) ke sath copy karega
        if [ -d "temp_extracted/DevForge" ]; then
          cp -rn temp_extracted/DevForge/.[!.]* . 2>/dev/null || true
          cp -rn temp_extracted/DevForge/* . 2>/dev/null || true
        elif [ -d "temp_extracted/devforge" ]; then
          cp -rn temp_extracted/devforge/.[!.]* . 2>/dev/null || true
          cp -rn temp_extracted/devforge/* . 2>/dev/null || true
        else
          cp -rn temp_extracted/.[!.]* . 2>/dev/null || true
          cp -rn temp_extracted/* . 2>/dev/null || true
        fi

    - name: Create Missing .env.example File
      run: |
        # Agar fir bhi .env.example nahi mila, toh empty file banayega
        if [ ! -f ".env.example" ]; then
          echo "Creating missing .env.example file..."
          touch .env.example
        fi
        if [ ! -f "app/.env.example" ]; then
          touch app/.env.example 2>/dev/null || true
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Ensure Gradlew Exists
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Generating gradle wrapper..."
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DevForge-App
        path: app/build/outputs/apk/debug/app-debug.apk
        
