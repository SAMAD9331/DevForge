        
name: Build DevForge APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract Zip into Root Directory
      run: |
        if [ -f "devforge.zip" ]; then
          echo "Extracting devforge.zip directly..."
          unzip -o devforge.zip -d .
        else
          echo "devforge.zip not found, skipping extraction."
        fi

    - name: Ensure Executable Permissions & Files Structure
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Ensure Gradlew Wrapper Exists
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DevForge-App
        path: app/build/outputs/apk/debug/*.apk
