name: Build DevForge APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Extract Zip File (if exists)
      run: |
        if [ -f "devforge.zip" ]; then
          unzip -o devforge.zip -d .
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🔑 YE STEP ADD KARNA ZARURI HAI (Aapke screenshot mein ye miss tha)
    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        cp debug.keystore app/debug.keystore 2>/dev/null || true

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Ensure Gradlew Wrapper Exists
      run: |
        if [ ! -f "gradlew" ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DevForge-App
        path: app/build/outputs/apk/debug/*.apk
